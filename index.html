<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Gojzu | Choose Your Destiny</title>
    <style>
        :root {
            /* Кольори для лівої (Кібер) частини */
            --left-bg-color: rgba(15, 23, 42, 0.85);
            --left-btn-hover: #38bdf8;
            /* Кольори для правої (Класичної) частини */
            --right-bg-color: rgba(48, 43, 99, 0.85);
            --right-btn-hover: #d4af37;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Вимикаємо прокрутку */
            background: #000;
        }

        h1 {
            font-size: 3.5rem; color: white; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 3px;
            white-space: nowrap;
        }

        p { font-size: 1.2rem; color: #cbd5e1; margin-bottom: 40px; font-weight: bold;}

        /* Налаштування половинок екрану */
        .split {
            position: absolute; width: 50%; height: 100%; overflow: hidden;
            display: flex; justify-content: center; align-items: center; text-align: center;
            transition: all 0.6s ease-in-out;
        }

        /* Ліва частина */
        .left { left: 0; background: url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1080') center/cover; }
        .left::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--left-bg-color); }

        /* Права частина */
        .right { right: 0; background: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1080') center/cover; }
        .right::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--right-bg-color); }

        .content { position: relative; z-index: 1; transition: transform 0.5s ease; }

        /* Кнопки */
        .btn {
            display: inline-block; padding: 15px 40px; text-decoration: none; color: white;
            font-weight: bold; border-radius: 5px; border: 2px solid white; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn-cyber:hover { background-color: var(--left-btn-hover); border-color: var(--left-btn-hover); color: #0f172a; }
        .btn-classic:hover { background-color: var(--right-btn-hover); border-color: var(--right-btn-hover); color: #000; }

        /* Анімація при наведенні (через класи body) */
        .hover-left .left { width: 75%; }
        .hover-left .right { width: 25%; }
        .hover-left .right .content { transform: scale(0.8); opacity: 0.5;}

        .hover-right .right { width: 75%; }
        .hover-right .left { width: 25%; }
        .hover-right .left .content { transform: scale(0.8); opacity: 0.5;}
    </style>
</head>
<body>

    <!-- Ліва частина (Кібер) -->
    <div class="split left">
        <div class="content">
            <h1>Cyber Oracle</h1>
            <p>Digital Destiny & API Forecasts</p>
            <!-- Посилання на вашу кібер-сторінку -->
            <a href="cyber.html" class="btn btn-cyber">Enter System (ENG)</a>
        </div>
    </div>

    <!-- Права частина (Класика партнера) -->
    <div class="split right">
        <div class="content">
            <h1 style="color: #d4af37;">Sztár Horoszkóp</h1>
            <p>Klasszikus Asztrológia és Kártyavetés</p>
            <!-- Посилання на сторінку партнера -->
            <a href="classic.html" class="btn btn-classic">Konzultálj (HUN)</a>
        </div>
    </div>

    <script>
        // Додаємо логіку розширення екранів при наведенні мишки
        const left = document.querySelector('.left');
        const right = document.querySelector('.right');
        const body = document.body;

        left.addEventListener('mouseenter', () => body.classList.add('hover-left'));
        left.addEventListener('mouseleave', () => body.classList.remove('hover-left'));

        right.addEventListener('mouseenter', () => body.classList.add('hover-right'));
        right.addEventListener('mouseleave', () => body.classList.remove('hover-right'));
    </script>
</body>
</html>
